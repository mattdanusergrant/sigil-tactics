<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#15171c">
<title>Sigil Tactics — Prototype</title>
<meta name="description" content="Sigil Tactics — a 3v3 tactical card-battler on a 5×4 grid. Round-based initiative by Speed. Mobile-web prototype.">
<meta property="og:title" content="Sigil Tactics">
<meta property="og:description" content="A 3v3 tactical card-battler — initiative by Speed, flank, position, and wipe out the enemy heroes.">
<meta property="og:type" content="website">
<style>
  :root{
    --bg:#15171c; --panel:#1e2128; --line:#2c303a; --ink:#e8eaf0; --dim:#8a91a3;
    --pa:#2d6cdf; --pb:#d8453b; --gold:#e7b53b; --hi:#f4f6fb;
    --move:#2d6cdf; --atk:#d8453b; --heal:#3fb36a; --deploy:#e7b53b; --spell:#b878ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  #app{max-width:480px; margin:0 auto; padding:8px 8px 14px; display:flex; flex-direction:column; gap:8px; min-height:100vh;}
  h1{font-size:16px; margin:2px 0 0; letter-spacing:.5px; text-align:center; color:var(--gold);}
  .sub{font-size:11px; color:var(--dim); text-align:center; margin:-2px 0 2px;}

  .heroes{display:flex; flex-direction:column; gap:4px;}
  .herorow{display:flex; gap:6px;}
  .hero{flex:1; background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:4px 6px; min-width:0;}
  .hero .htop{display:flex; align-items:center; gap:5px; font-size:11px;}
  .hero .hsym{font-weight:800; font-size:13px;}
  .hero.A .hsym{color:var(--pa);} .hero.B .hsym{color:var(--pb);}
  .hero .hname{color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;}
  .hero .hspd{color:var(--dim); font-size:10px;}
  .hero .hpwrap{height:7px; background:#0c0d11; border-radius:5px; overflow:hidden; margin-top:3px;}
  .hero .hpbar{height:100%; width:100%; transition:width .25s;}
  .hero.A .hpbar{background:var(--pa);} .hero.B .hpbar{background:var(--pb);}
  .hero .hnum{font-size:10px; color:var(--dim); margin-top:2px;}
  .hero.dead{opacity:.35;}
  .hero.dead .hsym{text-decoration:line-through;}

  #init{display:flex; gap:4px; overflow-x:auto; padding:4px 6px; background:var(--panel);
    border:1px solid var(--line); border-radius:9px; min-height:34px; align-items:center;}
  #init .lbl{font-size:10px; color:var(--dim); flex:0 0 auto; padding-right:2px; letter-spacing:.5px;}
  .ichip{flex:0 0 auto; display:flex; align-items:center; gap:3px; padding:3px 7px; border-radius:6px;
    font-size:11px; font-weight:700; background:#262a33; border:1px solid var(--line); white-space:nowrap;}
  .ichip.A{color:#9ec1ff;} .ichip.B{color:#ff9c95;}
  .ichip.active{background:var(--gold); color:#1a1407; border-color:var(--gold);}
  .ichip.acted{opacity:.35;}
  .ichip .spd{font-size:9px; opacity:.7;}

  #board{display:grid; grid-template-columns:repeat(5,1fr); gap:4px; background:var(--panel);
    padding:6px; border-radius:12px; border:1px solid var(--line);}
  .tile{position:relative; aspect-ratio:1/1; background:#23262f; border-radius:8px;
    display:flex; align-items:center; justify-content:center; user-select:none; transition:background .1s;}
  .tile.terrain{background:#2c4a35; box-shadow:inset 0 0 0 1px #3a7d44;}
  .tile.terrain::after{content:"▲"; position:absolute; bottom:2px; right:4px; font-size:9px; color:#6fcf8a; opacity:.8;}
  .tile.hl-deploy{outline:2px dashed var(--deploy); outline-offset:-2px; cursor:pointer;}
  .tile.hl-move{outline:2px solid var(--move); outline-offset:-2px; cursor:pointer;}
  .tile.hl-move::before{content:""; position:absolute; width:30%; height:30%; border-radius:50%; background:var(--move); opacity:.45;}
  .tile.hl-atk{outline:2px solid var(--atk); outline-offset:-2px; cursor:pointer;}
  .tile.hl-heal{outline:2px solid var(--heal); outline-offset:-2px; cursor:pointer;}
  .tile.hl-spell{outline:2px solid var(--spell); outline-offset:-2px; cursor:pointer;}
  .tile.active{outline:3px solid var(--gold); outline-offset:-2px;}

  .unit{width:84%; height:84%; border-radius:8px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; position:relative; color:#fff; font-weight:700;}
  .unit.A{background:linear-gradient(160deg,#3a7bef,#214fb0);}
  .unit.B{background:linear-gradient(160deg,#e8584d,#a82f26);}
  .unit.hero{box-shadow:inset 0 0 0 2px var(--gold);}
  .unit .sym{font-size:min(5.2vw,22px); line-height:1;}
  .unit .hp{position:absolute; bottom:-2px; right:-2px; background:#0c0d11; color:#fff;
    font-size:10px; line-height:1; padding:1px 4px; border-radius:7px; border:1px solid #000;}
  .unit .face{position:absolute; top:-4px; left:50%; transform:translateX(-50%); font-size:11px; color:#fff; text-shadow:0 0 3px #000;}
  .unit.done{filter:grayscale(.55) brightness(.8);}
  .unit .buffs{position:absolute; top:-4px; right:-2px; font-size:9px; font-weight:700; color:#fff; text-shadow:0 0 3px #000; background:#0c0d11; padding:1px 3px; border-radius:5px;}

  #status{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:7px 10px;
    font-size:12.5px; min-height:34px; display:flex; align-items:center;}
  #status b{color:var(--gold);}

  .barrow{display:flex; gap:8px; align-items:center;}
  .aether{font-size:13px; font-weight:700;}
  .aether .a{color:#56c5ff;}
  .btn{flex:1; background:var(--gold); color:#1a1407; border:none; border-radius:10px; padding:11px;
    font-size:14px; font-weight:800; letter-spacing:.3px;}
  .btn:active{filter:brightness(.9);}
  .btn:disabled{opacity:.4;}
  .btn.ghost{background:transparent; color:var(--dim); border:1px solid var(--line); flex:0 0 auto; padding:11px 14px;}

  #hand{display:flex; gap:6px; overflow-x:auto; padding:2px; min-height:74px;}
  .card{flex:0 0 56px; height:68px; background:#262a33; border:1px solid var(--line); border-radius:9px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; position:relative; padding:4px;}
  .card .cs{font-size:20px;} .card .cn{font-size:9px; color:var(--dim); text-align:center;}
  .card .cc{position:absolute; top:2px; left:4px; font-size:11px; font-weight:800; color:#56c5ff;}
  .card.sel{border-color:var(--hi); box-shadow:0 0 0 2px var(--hi);}
  .card.cant{opacity:.4;}
  .card .cat{position:absolute; top:2px; right:4px; font-size:8px; color:var(--dim); letter-spacing:.4px;}
  .card .ho{position:absolute; bottom:2px; left:4px; font-size:8px; font-weight:800;}
  .card.cat-Weapon{box-shadow:inset 0 -3px 0 #c14a3a;}
  .card.cat-Armor{box-shadow:inset 0 -3px 0 #4a78c1;}
  .card.cat-Helmet{box-shadow:inset 0 -3px 0 #4ac1a8;}
  .card.cat-Artifact{box-shadow:inset 0 -3px 0 var(--gold);}
  .card.cat-Action{box-shadow:inset 0 -3px 0 #c7c9d1;}
  .card.cat-Spell{box-shadow:inset 0 -3px 0 #b878ff;}

  .legend{font-size:10px; color:var(--dim); text-align:center; line-height:1.5;}
  #over{position:fixed; inset:0; background:rgba(8,9,12,.85); display:none; align-items:center; justify-content:center; z-index:9;}
  #over .box{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:22px; text-align:center; max-width:300px;}
  #over h2{margin:0 0 6px;} #over p{color:var(--dim); font-size:13px; margin:0 0 16px;}
</style>
</head>
<body>
<div id="app">
  <div class="herorow" id="heroesB"></div>
  <div id="board"></div>
  <div class="herorow" id="heroesA"></div>
  <div id="hand"></div>

  <div id="init"></div>
  <div id="status"></div>

  <div class="barrow">
    <span class="aether">Aether <span class="a" id="aether"></span></span>
    <button class="btn" id="endBtn">END TURN</button>
    <button class="btn ghost" id="newBtn">New</button>
  </div>

  <div class="legend">V Vanguard · A Archer · W Warden · 30-card deck (3 hero suites × 10) &nbsp;|&nbsp; SIDE ×1.5 / REAR ×2 · ▲ +1 ATK · ⛨ shield · +A atk-buff</div>
  <h1>SIGIL TACTICS</h1>
  <div class="sub">v0.8 prototype · 30-card hero suites · equip / action / spell</div>
</div>

<div id="over"><div class="box"><h2 id="overT"></h2><p id="overP"></p><button class="btn" onclick="location.reload()">Play again</button></div></div>

<script>
"use strict";
const R=4,C=5;

/* ---------- definitions ---------- */
const CLASSES={
  // heroes (placed at start, never in deck)
  vanguard:{name:"Vanguard",sym:"V",hp:6,atk:1,move:1,range:1,speed:3,hero:true},
  archer:{name:"Archer",sym:"A",hp:4,atk:1,move:1,range:2,speed:5,hero:true},
  warden:{name:"Warden",sym:"W",hp:5,atk:1,move:1,range:1,speed:4,hero:true,heal:true},
  // sidekicks (unit cards)
  skirmisher:{name:"Skirmisher",sym:"S",hp:3,atk:1,move:1,range:1,speed:1,cost:2,flank:true},
  scout:{name:"Scout",sym:"s",hp:3,atk:1,move:1,range:2,speed:2,cost:2}
};
const CARDS={
  // Vanguard suite (10)
  vg_weapon:   {hero:"V", cat:"Weapon",   kind:"dmg",         cost:2, dmg:2,    sym:"⚔", name:"Greatsword"},
  vg_armor:    {hero:"V", cat:"Armor",    kind:"shield",      cost:2, amount:2, sym:"⛨", name:"Plate Mail"},
  vg_helm:     {hero:"V", cat:"Helmet",   kind:"shield",      cost:1, amount:1, sym:"⛑", name:"Iron Helm"},
  vg_artifact: {hero:"V", cat:"Artifact", kind:"shield-all",  cost:3, amount:1, sym:"⚑", name:"War Banner"},
  vg_act_charge:{hero:"V",cat:"Action",   kind:"charge",      cost:1, amount:2, sym:"»", name:"Charge"},
  vg_act_bulwark:{hero:"V",cat:"Action",  kind:"heal",        cost:1, amount:2, sym:"+", name:"Bulwark"},
  vg_act_rally:{hero:"V", cat:"Action",   kind:"buff-atk-all",cost:3, amount:1, sym:"!", name:"Rally"},
  vg_spell_cry:{hero:"V", cat:"Spell",    kind:"buff-atk",    cost:2, amount:2, sym:"☄", name:"Battle Cry"},
  vg_spell_will:{hero:"V",cat:"Spell",    kind:"heal",        cost:2, amount:3, sym:"✦", name:"Iron Will"},
  vg_spell_sun:{hero:"V", cat:"Spell",    kind:"dmg",         cost:3, dmg:3,    sym:"✸", name:"Sundering Blow"},

  // Archer suite (10)
  ar_weapon:   {hero:"A", cat:"Weapon",   kind:"dmg",         cost:2, dmg:2,    sym:"➶", name:"Longbow"},
  ar_armor:    {hero:"A", cat:"Armor",    kind:"shield",      cost:1, amount:1, sym:"⛨", name:"Leather Cloak"},
  ar_helm:     {hero:"A", cat:"Helmet",   kind:"charge",      cost:1, amount:1, sym:"⛑", name:"Hawk Hood"},
  ar_artifact: {hero:"A", cat:"Artifact", kind:"dmg",         cost:2, dmg:2,    sym:"⚑", name:"Hunter's Mark"},
  ar_act_quick:{hero:"A", cat:"Action",   kind:"dmg",         cost:1, dmg:1,    sym:"›", name:"Quick Shot"},
  ar_act_volley:{hero:"A",cat:"Action",   kind:"dmg",         cost:3, dmg:2,    sym:"⋮", name:"Volley"},
  ar_act_rep:  {hero:"A", cat:"Action",   kind:"charge",      cost:1, amount:1, sym:"»", name:"Reposition"},
  ar_spell_wind:{hero:"A",cat:"Spell",    kind:"charge",      cost:2, amount:2, sym:"≋", name:"Wind Step"},
  ar_spell_pierce:{hero:"A",cat:"Spell",  kind:"dmg",         cost:3, dmg:3,    sym:"✸", name:"Piercing Arrow"},
  ar_spell_eye:{hero:"A", cat:"Spell",    kind:"buff-atk",    cost:1, amount:1, sym:"◉", name:"Eagle's Eye"},

  // Warden suite (10)
  wr_weapon:   {hero:"W", cat:"Weapon",   kind:"dmg",         cost:1, dmg:1,    sym:"⚔", name:"Quarterstaff"},
  wr_armor:    {hero:"W", cat:"Armor",    kind:"heal",        cost:2, amount:2, sym:"⛨", name:"Robe of Mending"},
  wr_helm:     {hero:"W", cat:"Helmet",   kind:"shield",      cost:2, amount:2, sym:"⛑", name:"Crown of Light"},
  wr_artifact: {hero:"W", cat:"Artifact", kind:"heal",        cost:4, amount:6, sym:"⚱", name:"Sacred Chalice"},
  wr_act_mend: {hero:"W", cat:"Action",   kind:"heal",        cost:2, amount:3, sym:"+", name:"Mend"},
  wr_act_restore:{hero:"W",cat:"Action",  kind:"heal",        cost:4, amount:5, sym:"+", name:"Restore"},
  wr_act_wall: {hero:"W", cat:"Action",   kind:"shield-all",  cost:3, amount:1, sym:"⛨", name:"Shield Wall"},
  wr_spell_heal:{hero:"W",cat:"Spell",    kind:"heal",        cost:2, amount:3, sym:"✚", name:"Heal"},
  wr_spell_bless:{hero:"W",cat:"Spell",   kind:"buff-atk",    cost:2, amount:1, sym:"☼", name:"Bless"},
  wr_spell_smite:{hero:"W",cat:"Spell",   kind:"dmg",         cost:2, dmg:2,    sym:"ϟ", name:"Smite"}
};
// Deck: each side runs the full 30-card suite (3 heroes × 10 cards).
const DECK=Object.keys(CARDS);

const VEC={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1]};
const OPP={N:"S",S:"N",E:"W",W:"E"};

let board, players, sel, busy, uid, heroes, units, roundNum, acted, activeId, over;
let initiativeToken, liveToken, prevBracketSpeed, prevBracketWasCrossTie;

/* ---------- helpers ---------- */
function deployRows(o){ return o==="A"?[2,3]:[0,1]; }
function inB(r,c){ return r>=0&&r<R&&c>=0&&c<C; }
function manh(a,b){ return Math.abs(a.r-b.r)+Math.abs(a.c-b.c); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function newUnit(owner,cls,r,c,facing){
  const d=CLASSES[cls];
  const u={id:++uid,owner,cls,r,c,facing,hp:d.hp,maxHp:d.hp,atk:d.atk,move:d.move,range:d.range,speed:d.speed,
    flank:!!d.flank,heal:!!d.heal,hero:!!d.hero,sym:d.sym,name:d.name,
    hasMoved:false,hasActed:false,
    shield:0,bonusAtkRound:0,bonusMoveTurn:0};
  units.push(u);
  return u;
}
function place(u){ board[u.r][u.c].unit=u; }
function activeUnit(){ return units.find(u=>u.id===activeId)||null; }

function newGame(){
  board=[]; for(let r=0;r<R;r++){board.push([]); for(let c=0;c<C;c++) board[r].push({unit:null,terrain:null});}
  uid=0; sel=null; busy=false; over=false; units=[]; acted=new Set(); activeId=null; roundNum=0;
  heroes={A:[],B:[]};
  const layout=[["vanguard",1],["warden",2],["archer",3]];
  for(const [cls,col] of layout){
    const ua=newUnit("A",cls,3,col,"N"); place(ua); heroes.A.push(ua);
    const ub=newUnit("B",cls,0,col,"S"); place(ub); heroes.B.push(ub);
  }
  players={
    A:{aether:0,maxAether:0,deck:shuffle(DECK.slice()),hand:[],human:true},
    B:{aether:0,maxAether:0,deck:shuffle(DECK.slice()),hand:[],human:false}
  };
  for(let i=0;i<3;i++){players.A.hand.push(players.A.deck.pop()); players.B.hand.push(players.B.deck.pop());}
  document.getElementById("over").style.display="none";
  // Initial initiative determination: highest-speed unit acts first; tied → random.
  // The side NOT acting first gets the Initiative token.
  const maxSpd=Math.max(...units.map(u=>u.speed));
  const sidesAtMax=new Set(units.filter(u=>u.speed===maxSpd).map(u=>u.owner));
  let firstActor;
  if(sidesAtMax.size===1){ firstActor=[...sidesAtMax][0]; liveToken=firstActor==="A"?"B":"A"; }
  else { firstActor=Math.random()<0.5?"A":"B"; liveToken=firstActor; /* so first-actor goes first in the tied bracket; flip after leaves token with the other side */ }
  initiativeToken=liveToken;
  startRound();
  render();
  promptOrAi();
}

/* ---------- round / initiative ---------- */
function flipToken(){ liveToken = liveToken==="A" ? "B" : "A"; }
function startRound(){
  roundNum++;
  for(const o of ["A","B"]){
    const p=players[o];
    p.maxAether=Math.min(10,p.maxAether+1); p.aether=p.maxAether;
    if(p.deck.length && p.hand.length<8) p.hand.push(p.deck.pop());
  }
  for(const u of units){ u.hasMoved=false; u.hasActed=false; u.bonusAtkRound=0; u.bonusMoveTurn=0; }
  acted=new Set();
  liveToken=initiativeToken;
  prevBracketSpeed=null;
  prevBracketWasCrossTie=false;
  advance();
}
function pendingUnits(){ return units.filter(u=>u.hp>0 && !acted.has(u.id)); }
function bracketOrder(bracket, tokenForBracket){
  const sA=bracket.filter(u=>u.owner==="A").sort((a,b)=>a.id-b.id);
  const sB=bracket.filter(u=>u.owner==="B").sort((a,b)=>a.id-b.id);
  const cross=sA.length>0 && sB.length>0;
  if(cross){
    const first=tokenForBracket==="A"?sA:sB;
    const second=tokenForBracket==="A"?sB:sA;
    return {order:[...first,...second], cross:true};
  }
  return {order:[...sA,...sB], cross:false};
}
function advance(){
  const pending=pendingUnits();
  if(!pending.length){
    if(prevBracketWasCrossTie) flipToken();
    initiativeToken=liveToken;
    activeId=null;
    if(!over) startRound();
    return;
  }
  const topSpd=Math.max(...pending.map(u=>u.speed));
  const isNewBracket=(prevBracketSpeed===null||topSpd<prevBracketSpeed);
  if(isNewBracket){
    if(prevBracketSpeed!==null && prevBracketWasCrossTie) flipToken();
  }
  const bracket=pending.filter(u=>u.speed===topSpd);
  const {order,cross}=bracketOrder(bracket, liveToken);
  if(isNewBracket){ prevBracketWasCrossTie=cross; }
  prevBracketSpeed=topSpd;
  activeId=order[0].id;
  sel=null;
}
// Forecast remaining order for the initiative ribbon, given current live state.
function forecastRemaining(){
  const result=[];
  let pendingIds=new Set(pendingUnits().map(u=>u.id));
  let simToken=liveToken;
  let simPrevSpd=prevBracketSpeed;
  let simPrevCross=prevBracketWasCrossTie;
  while(pendingIds.size){
    const pend=units.filter(u=>pendingIds.has(u.id));
    const topSpd=Math.max(...pend.map(u=>u.speed));
    const isNew=(simPrevSpd===null||topSpd<simPrevSpd);
    if(isNew && simPrevSpd!==null && simPrevCross){ simToken = simToken==="A"?"B":"A"; }
    const bracket=pend.filter(u=>u.speed===topSpd);
    const {order,cross}=bracketOrder(bracket, simToken);
    for(const u of order){ result.push(u); pendingIds.delete(u.id); }
    if(isNew){ simPrevCross=cross; }
    simPrevSpd=topSpd;
  }
  return result;
}
function endActiveTurn(){
  const u=activeUnit(); if(u){ acted.add(u.id); u.bonusMoveTurn=0; }
  activeId=null; sel=null;
  if(over) return;
  advance(); render(); promptOrAi();
}
function promptOrAi(){
  const u=activeUnit(); if(!u){ render(); return; }
  if(u.owner==="A"){
    say(`<b>${u.name}</b>'s turn — move, attack, or play a card.`);
    render();
  } else {
    busy=true; render();
    say(`Enemy <b>${u.name}</b> is acting…`);
    setTimeout(()=>{ if(over) return; aiAct(u); busy=false; render(); endActiveTurn(); }, 500);
  }
}

/* ---------- combat / actions ---------- */
function eachUnit(fn){ for(const u of units) if(u.hp>0) fn(u); }
function heroesAlive(o){ return heroes[o].filter(h=>h.hp>0); }
function effMove(u){ return u.move + (u.bonusMoveTurn||0); }
function effAtk(u){ return u.atk + (u.bonusAtkRound||0); }
function reachable(u){
  const dist={}, q=[{r:u.r,c:u.c}], res=[]; dist[u.r+","+u.c]=0;
  const lim=effMove(u);
  while(q.length){
    const cur=q.shift(), d=dist[cur.r+","+cur.c];
    for(const k in VEC){const[dr,dc]=VEC[k]; const nr=cur.r+dr,nc=cur.c+dc,key=nr+","+nc;
      if(!inB(nr,nc)||key in dist||board[nr][nc].unit||d+1>lim)continue;
      dist[key]=d+1; q.push({r:nr,c:nc}); res.push({r:nr,c:nc});}
  }
  return res;
}
function enemiesInRange(u){ const a=[]; eachUnit(t=>{if(t.owner!==u.owner&&manh(u,t)<=u.range)a.push(t);}); return a; }
function healablyAdjacent(u){ const a=[]; eachUnit(t=>{if(t.owner===u.owner&&t.id!==u.id&&manh(u,t)===1&&t.hp<t.maxHp)a.push(t);}); return a; }

function dirFromTo(from,to){
  const dr=to.r-from.r, dc=to.c-from.c;
  if(Math.abs(dr)>=Math.abs(dc)) return dr<0?"N":(dr>0?"S":"N");
  return dc<0?"W":"E";
}
function arcOf(attacker,defender){
  const incoming=dirFromTo(defender,attacker);
  if(incoming===defender.facing) return "front";
  if(incoming===OPP[defender.facing]) return "rear";
  return "side";
}
function moveUnit(u,r,c){
  board[u.r][u.c].unit=null;
  u.facing=dirFromTo({r:u.r,c:u.c},{r,c});
  u.r=r; u.c=c; board[r][c].unit=u; u.hasMoved=true;
}
function killCheck(defender){
  if(defender.hp<=0){
    board[defender.r][defender.c].unit=null;
    if(defender.hero){
      const side=defender.owner;
      if(heroesAlive(side).length===0) endGame(side==="A"?"B":"A");
    }
  }
}
function applyDamage(defender,raw){
  let dmg=raw;
  if(defender.shield>0){
    const absorbed=Math.min(defender.shield,dmg);
    defender.shield-=absorbed; dmg-=absorbed;
  }
  defender.hp-=dmg;
  return {absorbed:raw-dmg, taken:dmg};
}
function attack(attacker,defender){
  const arc=arcOf(attacker,defender);
  let mult=arc==="front"?1:arc==="side"?1.5:2;
  if(attacker.flank){ if(arc==="side")mult=2; if(arc==="rear")mult=2.5; }
  const high=board[attacker.r][attacker.c].terrain==="high"?1:0;
  const raw=Math.round((effAtk(attacker)+high)*mult);
  attacker.facing=dirFromTo(attacker,defender);
  const {taken}=applyDamage(defender,raw);
  attacker.hasActed=true;
  const shielded=raw-taken;
  say(`${attacker.name} hit ${defender.name} <b>(${arc.toUpperCase()} ×${mult})</b> for ${taken}${shielded?` <i>(${shielded} absorbed)</i>`:""}.`);
  killCheck(defender);
}
function healAct(warden,ally){
  ally.hp=Math.min(ally.maxHp,ally.hp+3); warden.hasActed=true;
  say(`${warden.name} mended ${ally.name} (+3).`);
}
function summon(o,cls,r,c){ const u=newUnit(o,cls,r,c,o==="A"?"N":"S"); place(u); return u; }

/* ---------- card play (consumes the active unit's turn) ---------- */
function playCard(owner,handIdx,target){
  const p=players[owner]; const key=p.hand[handIdx]; const card=CARDS[key];
  p.aether-=card.cost; p.hand.splice(handIdx,1);
  const who=owner==="A"?"You":"Enemy";
  if(card.kind==="heal"){
    const u=board[target.r][target.c].unit;
    const before=u.hp; u.hp=Math.min(u.maxHp,u.hp+card.amount);
    say(`${card.name}: ${u.name} +${u.hp-before} HP.`);
  } else if(card.kind==="dmg"){
    const u=board[target.r][target.c].unit;
    const {taken}=applyDamage(u,card.dmg);
    say(`${card.name}: ${u.name} takes ${taken}.`); killCheck(u);
  } else if(card.kind==="shield"){
    const u=board[target.r][target.c].unit;
    u.shield+=card.amount; say(`${card.name}: ${u.name} gains ${card.amount} shield.`);
  } else if(card.kind==="shield-all"){
    eachUnit(u=>{ if(u.owner===owner) u.shield+=card.amount; });
    say(`${who} cast ${card.name} — all allies +${card.amount} shield.`);
  } else if(card.kind==="buff-atk"){
    const u=board[target.r][target.c].unit;
    u.bonusAtkRound+=card.amount; say(`${card.name}: ${u.name} +${card.amount} ATK this round.`);
  } else if(card.kind==="buff-atk-all"){
    eachUnit(u=>{ if(u.owner===owner) u.bonusAtkRound+=card.amount; });
    say(`${who} cast ${card.name} — all allies +${card.amount} ATK this round.`);
  } else if(card.kind==="charge"){
    const u=board[target.r][target.c].unit;
    u.bonusMoveTurn+=card.amount; say(`${card.name}: ${u.name} +${card.amount} move this turn.`);
  }
}
function canPlayCardNow(){
  const u=activeUnit(); return u && u.owner==="A" && !u.hasMoved && !u.hasActed;
}

/* ---------- player interaction ---------- */
function onTile(r,c){
  if(busy||over) return;
  const u=activeUnit(); if(!u||u.owner!=="A") return;
  const cell=board[r][c];
  if(sel&&sel.t==="card"){
    if(cell._hl){ playCard("A",sel.i,{r,c}); sel=null; render(); endActiveTurn(); }
    else { sel=null; render(); }
    return;
  }
  // unit-turn actions: move and/or act on the active unit only
  const tgt=cell.unit;
  if(cell._hl==="move"){ moveUnit(u,r,c); render(); return; }
  if(cell._hl==="atk"){ attack(u,tgt); render(); if(over) return; endActiveTurn(); return; }
  if(cell._hl==="heal"){ healAct(u,tgt); render(); endActiveTurn(); return; }
}
function anyAlly(o){ let any=false; eachUnit(u=>{if(u.owner===o)any=true;}); return any; }
function onCard(i){
  if(busy||over) return;
  if(!canPlayCardNow()){ say("Cards may only be played at the start of one of your units' turns."); render(); return; }
  const key=players.A.hand[i]; const card=CARDS[key];
  if(card.cost>players.A.aether) return;
  if(card.kind==="heal" && !anyDamagedAlly("A")){ say("No wounded ally to heal."); return; }
  if(card.kind==="dmg" && !anyEnemy("A")){ say("No enemy in play."); return; }
  if((card.kind==="shield"||card.kind==="shield-all"||card.kind==="buff-atk"||card.kind==="buff-atk-all"||card.kind==="charge") && !anyAlly("A")){ say("No ally to target."); return; }
  sel=(sel&&sel.t==="card"&&sel.i===i)?null:{t:"card",i}; render();
}
function anyDamagedAlly(o){ let any=false; eachUnit(u=>{if(u.owner===o&&u.hp<u.maxHp)any=true;}); return any; }
function anyEnemy(o){ let any=false; eachUnit(u=>{if(u.owner!==o)any=true;}); return any; }

/* ---------- AI (single-unit activation) ---------- */
function aiAct(u){
  // 1) consider playing a card with this turn
  const cardPlay=aiPickCardForUnit(u);
  const normalScore=aiNormalActionScore(u);
  if(cardPlay && cardPlay.score > normalScore){
    playCard("B",cardPlay.handIdx,cardPlay.target);
    return;
  }
  // 2) warden first-heal as adj action (free relative to move/atk slot)
  if(u.heal){ const h=healablyAdjacent(u); if(h.length){ h.sort((a,b)=>(a.hp-(a.hero?99:0))-(b.hp-(b.hero?99:0))); healAct(u,h[0]); } }
  // 3) attack-or-approach
  if(!u.hasActed){
    let tgt=pickTarget(u,enemiesInRange(u));
    if(!tgt && !u.hasMoved){
      const goal=nearestHeroOrUnit(u); if(goal){ const step=bestStep(u,goal); if(step) moveUnit(u,step.r,step.c); }
      tgt=pickTarget(u,enemiesInRange(u));
    }
    if(tgt) attack(u,tgt);
    else if(!u.hasMoved){ const goal=nearestHeroOrUnit(u); if(goal){ const step=bestStep(u,goal); if(step) moveUnit(u,step.r,step.c); } }
  } else if(!u.hasMoved){ const goal=nearestHeroOrUnit(u); if(goal){ const step=bestStep(u,goal); if(step) moveUnit(u,step.r,step.c); } }
}
function aiNormalActionScore(u){
  // rough value of the unit's own move/attack this turn
  let best=0;
  for(const e of enemiesInRange(u)){
    const arc=arcOf(u,e); let m=arc==="front"?1:arc==="side"?1.5:2; if(u.flank){if(arc==="side")m=2;if(arc==="rear")m=2.5;}
    const dmg=Math.round(u.atk*m); let s=dmg+(dmg>=e.hp?6:0)+(e.hero?3:0); if(s>best)best=s;
  }
  return best || 1; // small baseline for "advance"
}
function aiPickCardForUnit(u){
  const B=players.B; let best=null;
  B.hand.forEach((key,i)=>{
    const card=CARDS[key]; if(card.cost>B.aether) return;
    let score=0, target=null;
    if(card.kind==="heal"){
      const t=aiHealTarget("B"); if(!t) return;
      const heal=Math.min(card.amount, t.maxHp-t.hp);
      if(heal<=0) return;
      score=heal+(t.hero?3:0); target={r:t.r,c:t.c};
    } else if(card.kind==="dmg"){
      const t=aiDmgTarget("B",card.dmg); if(!t) return;
      score=card.dmg*1.5+(t.hp<=card.dmg?6:0)+(t.hero?3:0); target={r:t.r,c:t.c};
    } else if(card.kind==="shield"){
      let bestT=null,bs=-1;
      eachUnit(au=>{ if(au.owner==="B"){ let s=(au.maxHp-au.hp)+(au.hero?3:0)+(au.shield?-2:0); if(s>bs){bs=s;bestT=au;} } });
      if(!bestT) return; score=card.amount+(bestT.hero?3:0); target={r:bestT.r,c:bestT.c};
    } else if(card.kind==="buff-atk"){
      // best on a unit that has enemies in range and hasn't acted
      let bestT=null,bs=-1;
      eachUnit(au=>{ if(au.owner==="B" && enemiesInRange(au).length){ let s=au.atk+(au.hero?2:0); if(s>bs){bs=s;bestT=au;} } });
      if(!bestT) return; score=2+card.amount; target={r:bestT.r,c:bestT.c};
    } else if(card.kind==="charge"){
      let bestT=null,bs=-1;
      eachUnit(au=>{ if(au.owner==="B" && !enemiesInRange(au).length){ let s=au.hero?3:1; if(s>bs){bs=s;bestT=au;} } });
      if(!bestT) return; score=1+card.amount; target={r:bestT.r,c:bestT.c};
    } else if(card.kind==="shield-all"||card.kind==="buff-atk-all"){
      let allies=[]; eachUnit(au=>{ if(au.owner==="B") allies.push(au); });
      if(!allies.length) return; score=allies.length*card.amount;
      target={r:allies[0].r,c:allies[0].c}; // target tile is arbitrary; effect applies to all
    }
    if(!best || score>best.score){ best={handIdx:i,target,score}; }
  });
  return best;
}
function pickTarget(u,list){
  if(!list.length) return null;
  const score=t=>{ const arc=arcOf(u,t); let m=arc==="front"?1:arc==="side"?1.5:2; if(u.flank){if(arc==="side")m=2;if(arc==="rear")m=2.5;}
    const dmg=Math.round(u.atk*m); let s=dmg; if(dmg>=t.hp)s+=100; if(t.hero)s+=30; s+=(t.maxHp-t.hp); return s; };
  return list.slice().sort((a,b)=>score(b)-score(a))[0];
}
function nearestHeroOrUnit(u){
  let best=null,bd=99; eachUnit(t=>{ if(t.owner!==u.owner){ let d=manh(u,t)-(t.hero?0.5:0); if(d<bd){bd=d;best=t;} } }); return best;
}
function aiHealTarget(o){
  let best=null,bs=-1; eachUnit(u=>{ if(u.owner===o&&u.hp<u.maxHp){ let s=(u.maxHp-u.hp)+(u.hero?5:0); if(s>bs){bs=s;best=u;} } }); return best;
}
function aiDmgTarget(o,dmg){
  let best=null,bs=-1; eachUnit(u=>{ if(u.owner!==o){ let s=1+(u.hp<=dmg?8:0)+(u.hero?4:0)-u.hp*0.2; if(s>bs){bs=s;best=u;} } }); return best;
}
function bestStep(u,goal){ const tiles=reachable(u); if(!tiles.length) return null;
  tiles.sort((a,b)=>(Math.abs(a.r-goal.r)+Math.abs(a.c-goal.c))-(Math.abs(b.r-goal.r)+Math.abs(b.c-goal.c)));
  const cur=Math.abs(u.r-goal.r)+Math.abs(u.c-goal.c); const top=tiles[0];
  return (Math.abs(top.r-goal.r)+Math.abs(top.c-goal.c))<cur?top:null;
}

/* ---------- render ---------- */
function say(html){ document.getElementById("status").innerHTML=html; }
function endGame(winner){
  over=true; busy=true; activeId=null;
  document.getElementById("overT").textContent = winner==="A"?"Victory":"Defeat";
  document.getElementById("overP").textContent = winner==="A"
    ? "All enemy heroes have fallen." : "All your heroes have fallen.";
  document.getElementById("over").style.display="flex";
}
function clearHl(){ for(let r=0;r<R;r++)for(let c=0;c<C;c++) board[r][c]._hl=null; }
function computeHl(){
  clearHl();
  if(over||busy) return;
  const u=activeUnit(); if(!u||u.owner!=="A") return;
  if(sel&&sel.t==="card"){
    const key=players.A.hand[sel.i]; const card=CARDS[key];
    if(card.kind==="heal"){
      eachUnit(au=>{ if(au.owner==="A"&&au.hp<au.maxHp) board[au.r][au.c]._hl="heal"; });
    } else if(card.kind==="dmg"){
      eachUnit(au=>{ if(au.owner!=="A") board[au.r][au.c]._hl="spell"; });
    } else if(card.kind==="shield"||card.kind==="buff-atk"||card.kind==="charge"){
      eachUnit(au=>{ if(au.owner==="A") board[au.r][au.c]._hl="heal"; });
    } else if(card.kind==="shield-all"||card.kind==="buff-atk-all"){
      eachUnit(au=>{ if(au.owner==="A") board[au.r][au.c]._hl="heal"; });
    }
    return;
  }
  if(!u.hasMoved) for(const t of reachable(u)) board[t.r][t.c]._hl="move";
  if(!u.hasActed){ for(const e of enemiesInRange(u)) board[e.r][e.c]._hl="atk";
    if(u.heal) for(const a of healablyAdjacent(u)) board[a.r][a.c]._hl="heal"; }
}
function renderHeroes(){
  for(const side of ["A","B"]){
    const row=document.getElementById("heroes"+side); row.innerHTML="";
    heroes[side].forEach(h=>{
      const el=document.createElement("div"); el.className="hero "+side+(h.hp<=0?" dead":"");
      const pct=100*Math.max(0,h.hp)/h.maxHp;
      el.innerHTML=`<div class="htop"><span class="hsym">${h.sym}</span><span class="hname">${h.name}</span><span class="hspd">spd ${h.speed}</span></div>
        <div class="hpwrap"><div class="hpbar" style="width:${pct}%"></div></div>
        <div class="hnum">HP ${Math.max(0,h.hp)}/${h.maxHp}</div>`;
      row.appendChild(el);
    });
  }
}
function renderInit(){
  const el=document.getElementById("init"); el.innerHTML="";
  const lbl=document.createElement("span"); lbl.className="lbl"; lbl.textContent="R"+roundNum; el.appendChild(lbl);
  const tok=document.createElement("span"); tok.className="ichip "+liveToken;
  tok.innerHTML=`◆<span class="spd">init</span>`; el.appendChild(tok);
  const rem=forecastRemaining();
  const actedList=units.filter(u=>u.hp>0 && acted.has(u.id));
  const order=[...rem, ...actedList];
  for(const u of order){
    const c=document.createElement("span");
    c.className="ichip "+u.owner+(u.id===activeId?" active":"")+(acted.has(u.id)?" acted":"");
    c.innerHTML=`${u.sym}<span class="spd">${u.speed}</span>`;
    el.appendChild(c);
  }
}
function render(){
  computeHl();
  const bd=document.getElementById("board"); bd.innerHTML="";
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const cell=board[r][c]; const t=document.createElement("div");
    t.className="tile"+(cell.terrain?" terrain":"");
    if(cell._hl==="deploy")t.classList.add("hl-deploy");
    if(cell._hl==="move")t.classList.add("hl-move");
    if(cell._hl==="atk")t.classList.add("hl-atk");
    if(cell._hl==="heal")t.classList.add("hl-heal");
    if(cell._hl==="spell")t.classList.add("hl-spell");
    const u=cell.unit;
    if(u&&u.id===activeId)t.classList.add("active");
    if(u){ const arrow={N:"↑",S:"↓",E:"→",W:"←"}[u.facing]; const done=acted.has(u.id);
      const buffs=(u.shield?`⛨${u.shield}`:"")+(u.bonusAtkRound?` +${u.bonusAtkRound}A`:"");
      t.innerHTML=`<div class="unit ${u.owner}${u.hero?" hero":""}${done?" done":""}">
        <span class="face">${arrow}</span><span class="sym">${u.sym}</span><span class="hp">${u.hp}</span>${buffs?`<span class="buffs">${buffs}</span>`:""}</div>`; }
    t.onclick=()=>onTile(r,c);
    bd.appendChild(t);
  }
  renderHeroes(); renderInit();
  document.getElementById("aether").textContent=players.A.aether+" / "+players.A.maxAether;
  const h=document.getElementById("hand"); h.innerHTML="";
  const cardable=canPlayCardNow();
  players.A.hand.forEach((key,i)=>{ const card=CARDS[key]; const el=document.createElement("div");
    const cant=!cardable||card.cost>players.A.aether||busy||over;
    el.className="card cat-"+card.cat+(cant?" cant":"")+((sel&&sel.t==="card"&&sel.i===i)?" sel":"");
    el.innerHTML=`<span class="cc">${card.cost}</span><span class="cat">${card.cat.slice(0,3).toUpperCase()}</span><span class="cs">${card.sym}</span><span class="cn">${card.name}</span><span class="ho">${card.hero}</span>`;
    el.onclick=()=>onCard(i); h.appendChild(el); });
  const ebtn=document.getElementById("endBtn"); const u=activeUnit();
  ebtn.disabled = over || busy || !u || u.owner!=="A";
  ebtn.textContent = (u && u.owner==="A") ? "END TURN" : "ENEMY…";
  if(!over && u && u.owner==="A" && sel && sel.t==="card"){
    const card=CARDS[players.A.hand[sel.i]];
    let hint="";
    if(card.kind==="heal") hint="tap a wounded ally.";
    else if(card.kind==="dmg") hint="tap an enemy.";
    else if(card.kind==="shield") hint="tap an ally to shield.";
    else if(card.kind==="buff-atk") hint="tap an ally to buff.";
    else if(card.kind==="charge") hint="tap an ally to charge.";
    else if(card.kind==="shield-all"||card.kind==="buff-atk-all") hint="tap any ally to cast on all.";
    say(`Play <b>${card.name}</b> — ${hint}`);
  }
}

document.getElementById("endBtn").onclick=()=>{ if(over||busy) return; const u=activeUnit(); if(u&&u.owner==="A") endActiveTurn(); };
document.getElementById("newBtn").onclick=()=>newGame();
newGame();
</script>
